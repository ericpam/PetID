<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPD 寵物身份證編輯器 V1.55</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @font-face { font-family: 'AdobeMing'; src: url('Font/Adobe ming Std L.otf'); }
        @font-face { font-family: 'MingLiU'; src: url('Font/新細明體.ttc'); }
        @font-face { font-family: 'KaiU'; src: url('Font/標楷體.ttc'); }
        @font-face { font-family: 'Mangal'; src: url('Font/mangal.ttf'); }

        :root { --bg-color: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        h3 { margin: 10px 0 0 0; color: #333; letter-spacing: 2px; font-weight: bold; }
        .version-tag { font-size: 12px; color: #888; margin-bottom: 20px; }

        .workspace-wrapper { display: flex; flex-direction: column; align-items: center; width: 600px; gap: 15px; }

        .preview-container { line-height: 0; background-color: transparent; }
        canvas { display: block; border: 1px solid #ccc; border-radius: 20px; background-color: transparent; width: 600px; height: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .canvas-label { font-size: 14px; color: #666; margin-bottom: 5px; font-weight: bold; width: 100%; text-align: left; }

        .input-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 600px; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; }
        .section-title { font-size: 14px; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-bottom: 5px; }

        .input-row { display: flex; gap: 10px; align-items: center; width: 100%; }
        .input-group { display: flex; align-items: center; gap: 5px; flex: 1; }
        
        .label-text { font-weight: bold; font-size: 13px; color: #444; width: 80px; flex-shrink: 0; }
        input, select { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        
        input[type="text"].date-input { text-align: center; }
        .full-width { flex: 1; width: 100%; }

        /* 按鈕與日期框專屬樣式 */
        .upload-btn { flex: 1; cursor: pointer; padding: 7px; background-color: #fff; border: 1px solid #ddd; border-radius: 4px; transition: 0.2s; }
        .upload-btn:hover { background-color: #f0f0f0; }
        .date-year { width: 45px; }
        .date-month-day { width: 35px; }

        /* 鎖定狀態：反灰顯色且禁止點選 */
        input:disabled { background-color: #ececec; color: #999; cursor: not-allowed; }
        
        /* 綠碼專屬鎖定狀態：反灰底、綠字粗體 */
        #greenSerial:disabled { background-color: #ececec; color: #4EB748; font-weight: bold; cursor: not-allowed; border-color: #ddd; }

        .align-mid-label { width: 50px; text-align: right; font-weight: bold; font-size: 13px; color: #444; flex-shrink: 0; }
        .easy-card-label { font-size: 12px; color: #444; display: flex; align-items: center; gap: 3px; cursor: pointer; white-space: nowrap; }

        #fatherLabel, #motherLabel { width: 35px; text-align: left; font-weight: bold; border: 1px solid #ddd; border-radius: 4px; padding: 6px; }

        #barcodeTemp { display: none; }
    </style>
</head>
<body>

    <!-- 隱藏的字體預載區，徹底解決啟動與重載時文字跳動問題 -->
    <div style="position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; overflow: hidden;">
        <span style="font-family: 'AdobeMing';">預載</span>
        <span style="font-family: 'MingLiU';">預載</span>
        <span style="font-family: 'KaiU';">預載</span>
        <span style="font-family: 'Mangal';">預載</span>
    </div>

    <h3>EPD 寵物身份證編輯器</h3>
    <div class="version-tag">Ver 1.55 正式版</div>

    <div class="workspace-wrapper">
        <div class="canvas-label">● 身分證正面</div>
        <div class="preview-container"><canvas id="frontCanvas" width="600" height="360"></canvas></div>

        <div class="input-container">
            <div class="section-title">正面資料</div>
            <div class="input-row">
                <div class="input-group"><label class="label-text">寵物品種:</label><select id="species" class="full-width"></select></div>
                <div class="input-group" style="flex:0 0 160px">
                    <label class="label-text" style="width:50px">大頭照:</label>
                    <input type="file" id="photoUpload" accept="image/*" style="display:none">
                    <button class="upload-btn" onclick="document.getElementById('photoUpload').click()">選擇檔案</button>
                </div>
            </div>
            <div class="input-row">
                <div class="input-group"><label class="label-text">姓名:</label><input type="text" id="petName" maxlength="5" class="full-width" value="請輸入"></div>
                <div class="input-group" style="flex:0 0 100px"><label class="label-text" style="width:40px">性別:</label><select id="gender" class="full-width"><option>公</option><option>母</option><option>男</option><option>女</option></select></div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="label-text">出生日期:</label>
                    民國 <input type="text" inputmode="numeric" id="birthYear" class="date-input date-year" maxlength="3" value="000" oninput="validateDate(this, 999)"> 年 
                    <input type="text" inputmode="numeric" id="birthMonth" class="date-input date-month-day" maxlength="2" value="00" oninput="validateDate(this, 12)"> 月 
                    <input type="text" inputmode="numeric" id="birthDay" class="date-input date-month-day" maxlength="2" value="00" oninput="validateDate(this, 31)"> 日
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label class="label-text">發證日期:</label>
                    民國 <input type="text" inputmode="numeric" id="issueYear" class="date-input date-year" maxlength="3" value="000" oninput="validateDate(this, 999)"> 年 
                    <input type="text" inputmode="numeric" id="issueMonth" class="date-input date-month-day" maxlength="2" value="00" oninput="validateDate(this, 12)"> 月 
                    <input type="text" inputmode="numeric" id="issueDay" class="date-input date-month-day" maxlength="2" value="00" oninput="validateDate(this, 31)"> 日 
                    (<input type="text" id="issueLocation" style="width:60px; text-align:center;" maxlength="3" value="">) 初發
                </div>
            </div>
            <div class="input-row"><div class="input-group"><label class="label-text">晶片號碼:</label><input type="text" id="chipId" maxlength="15" class="full-width" value="000000000000000"></div></div>
        </div>

        <div class="canvas-label">● 身分證背面</div>
        <div class="preview-container"><canvas id="backCanvas" width="600" height="360"></canvas></div>

        <div class="input-container">
            <div class="section-title">背面資料</div>
            <div class="input-row">
                <div class="input-group">
                    <label class="label-text">父母欄:</label>
                    <input type="text" id="fatherLabel" value="父" disabled> 
                    <input type="text" id="fatherName" class="full-width" maxlength="5" value="請輸入">
                </div>
                <div class="input-group">
                    <input type="text" id="motherLabel" value="母" disabled> 
                    <input type="text" id="motherName" class="full-width" maxlength="5" value="請輸入">
                    <label class="easy-card-label" style="margin-left:5px">
                        <input type="checkbox" id="editParentsToggle" onchange="toggleParentsEdit()"> 變更父母欄
                    </label>
                </div>
            </div>
            <div class="input-row">
                <div class="input-group"><label class="label-text">品種:</label><input type="text" id="breedName" class="full-width" maxlength="5" value="請輸入"></div>
                <div class="input-group">
                    <label class="align-mid-label">電話:</label>
                    <input type="text" inputmode="numeric" id="phoneNum" class="full-width" maxlength="10" placeholder="10碼數字" value="" oninput="this.value=this.value.replace(/[^0-9]/g, ''); drawAll();">
                </div>
            </div>
            <div class="input-row"><div class="input-group"><label class="label-text">出生地:</label><input type="text" id="birthPlace" class="full-width" value="新北市"></div></div>
            <div class="input-row"><div class="input-group"><label class="label-text">住址:</label><input type="text" id="address" class="full-width" value=""></div></div>
            <div class="input-row">
                <div class="input-group"><label class="label-text">條碼類型:</label><select id="barcodeType" class="full-width" onchange="updateBarcodeType()"><option value="CODE128">會員 CODE 128</option><option value="CODE39">載具 CODE 39</option></select></div>
                <div class="input-group">
                    <label class="align-mid-label">號碼:</label>
                    <input type="text" id="backChipId" class="full-width" maxlength="15" value="000000000000000" oninput="this.value=this.value.replace(/[^a-zA-Z0-9]/g, ''); drawAll();">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group" style="flex:1"><label class="label-text">綠碼:</label><input type="text" id="greenSerial" class="full-width" disabled></div>
                <label class="easy-card-label">
                    <input type="checkbox" id="easyCardEnable" onchange="updateGreenSerialLogic()"> 加悠遊卡功能
                </label>
            </div>
        </div>
    </div>

    <canvas id="barcodeTemp"></canvas>

    <script>
        const fCanvas = document.getElementById('frontCanvas'), fCtx = fCanvas.getContext('2d');
        const bCanvas = document.getElementById('backCanvas'), bCtx = bCanvas.getContext('2d');
        const fBgImg = new Image(), bBgImg = new Image();
        let petPhoto = new Image();

        // 寫入最終版精確參數
        const config = {
            photo: { x: 412, y: 36, w: 165, h: 212 },
            
            f_name: { x: 101.5, y: 182.7, size: 30.1, spacing: 25, font: "AdobeMing", color: "#000000" },
            f_birth: { x: 101.5, y: 259.8, size: 24.3, spacing: 0, font: "MingLiU", color: "#000000" },
            f_issue: { x: 101.5, y: 320.8, size: 19.5, spacing: 0, font: "MingLiU", color: "#000000" },
            f_gender: { x: 509.1, y: 259.1, size: 19.8, spacing: 0.0, font: 'MingLiU', color: '#000000' },
            f_chip: { x: 401.4, y: 322.8, size: 21.1, spacing: -8.9, font: 'KaiU', color: '#e74c3c' },

            b_fName: { x: 102, y: 27.7, size: 26.7, spacing: 2.8, font: "MingLiU", color: "#000000" },
            b_mName: { x: 375, y: 27.7, size: 26.7, spacing: 2.8, font: "MingLiU", color: "#000000" },
            b_breedName: { x: 102, y: 85.5, size: 26.7, spacing: 2.8, font: "MingLiU", color: "#000000" },
            b_phoneNum: { x: 374.9, y: 85, size: 26.7, spacing: 0, font: "MingLiU", color: "#000000" },
            b_birthPlace: { x: 100, y: 135, size: 26.7, spacing: 1, font: "MingLiU", color: "#000000" },
            b_address: { x: 99.1, y: 196, size: 25, spacing: 0, font: "MingLiU", color: "#000000" },
            b_barcode: { x: 38, y: 267, width: 2, height: 75 }, 
            b_green: { x: 361.2, y: 323.8, size: 27.9, spacing: -9, font: "AdobeMing", color: "#4EB748" }
        };

        function validateDate(el, maxVal) {
            let val = el.value.replace(/[^0-9]/g, ''); 
            if (val === "") {
                el.value = "";
                drawAll();
                return;
            }
            let num = parseInt(val, 10);
            if (maxVal && num > maxVal) {
                el.value = maxVal.toString();
            } else {
                el.value = val;
            }
            drawAll();
        }

        const speciesList = [
            { label: "01.犬民", file: "犬民" }, { label: "02.貓民", file: "貓民" }, { label: "03.鼠民", file: "鼠民" },
            { label: "04.兔民", file: "兔民" }, { label: "05.鳥民", file: "鳥民" }, { label: "06.龜民", file: "龜民" },
            { label: "07.鼯民 (蜜袋鼯)", file: "鼯民" }, { label: "08.刺民 (刺蝟)", file: "刺民" }, { label: "09.鴨民", file: "鴨民" },
            { label: "10.蜥民 (蜥蝪,守宮)", file: "蜥民" }, { label: "11.獴民 (狐獴)", file: "獴民" }, { label: "12.蛙民 (角蛙)", file: "蛙民" },
            { label: "13.蛇民", file: "蛇民" }, { label: "14.豬民", file: "豬民" }, { label: "15.魚民", file: "魚民" },
            { label: "16.貂民 (雪貂)", file: "貂民" }, { label: "17.鵝民", file: "鵝民" }, { label: "18.獺民 (水獺)", file: "獺民" },
            { label: "19.狐民 (銀狐)", file: "狐民" }, { label: "20.鱷民", file: "鱷民" }, { label: "21.羊民", file: "羊民" },
            { label: "22.甲民 (甲蟲)", file: "甲民" }, { label: "23.螳民 (螳螂)", file: "螳螂" }, { label: "24.雞民", file: "雞民" },
            { label: "25.驢民", file: "驢民" }, { label: "99.娃娃 (布偶)", file: "娃娃" }
        ];

        const speciesSelect = document.getElementById('species');
        speciesList.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.file; opt.textContent = item.label;
            speciesSelect.appendChild(opt);
        });

        function toFullWidth(str) { return str.replace(/[!-~]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0)).replace(/ /g, "\u3000"); }
        function generateGreenSerial() { const now = new Date(); return `${now.getFullYear()}${(now.getMonth() + 1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}000`; }

        function updateGreenSerialLogic() {
            const isEasyCard = document.getElementById('easyCardEnable').checked;
            document.getElementById('greenSerial').value = isEasyCard ? "000 000000 0" : generateGreenSerial();
            drawAll();
        }

        function toggleParentsEdit() {
            const enabled = document.getElementById('editParentsToggle').checked;
            document.getElementById('fatherLabel').disabled = !enabled;
            document.getElementById('motherLabel').disabled = !enabled;
            drawAll();
        }

        function updateBackgrounds() {
            fBgImg.src = `image_BG/${speciesSelect.value}證_F.jpg`;
            bBgImg.src = `image_BG/${speciesSelect.value}證_K.jpg`;
        }
        
        document.getElementById('species').addEventListener('change', () => { updateBackgrounds(); });

        function updateBarcodeType() {
            const type = document.getElementById('barcodeType').value;
            const backChipInput = document.getElementById('backChipId');
            
            if (type === "CODE39") {
                backChipInput.maxLength = 10;
                backChipInput.value = "ABCDEFG";
            } else {
                backChipInput.maxLength = 15;
                // 若從 CODE39 切回，則將正面晶片號碼濾除符號後帶入
                backChipInput.value = document.getElementById('chipId').value.replace(/[^a-zA-Z0-9]/g, '').substring(0, 15);
            }
            drawAll();
        }

        document.getElementById('chipId').addEventListener('input', e => {
            if (document.getElementById('barcodeType').value === "CODE128") {
                document.getElementById('backChipId').value = e.target.value.replace(/[^a-zA-Z0-9]/g, '').substring(0, 15);
                drawAll();
            }
        });

        document.getElementById('photoUpload').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    petPhoto = new Image(); 
                    petPhoto.onload = drawAll;
                    petPhoto.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        let isDrawing = false;
        function drawAll() {
            if (isDrawing) return;
            isDrawing = true;
            requestAnimationFrame(() => {
                if (fBgImg.complete && fBgImg.naturalWidth > 0) drawFront();
                if (bBgImg.complete && bBgImg.naturalWidth > 0) drawBack();
                isDrawing = false;
            });
        }

        function renderText(targetCtx, key, text, useFullWidth, maxWidth = null, lineHeight = null) {
            const cfg = config[key];
            targetCtx.fillStyle = cfg.color || "black";
            targetCtx.font = `${cfg.font === 'AdobeMing' || cfg.font === 'Mangal' || (cfg.font === 'KaiU' && cfg.color === '#e74c3c') ? 'bold ' : ''}${cfg.size}px '${cfg.font}'`;
            const processedText = useFullWidth ? toFullWidth(text) : text;
            
            let curX = cfg.x;
            let curY = cfg.y;

            if (maxWidth) {
                let chars = processedText.split('');
                for (let i = 0; i < chars.length; i++) {
                    let char = chars[i];
                    let charWidth = targetCtx.measureText(char).width + parseFloat(cfg.spacing);
                    if (curX + charWidth > cfg.x + maxWidth) {
                        curX = cfg.x;
                        curY += lineHeight;
                    }
                    targetCtx.fillText(char, curX, curY);
                    curX += charWidth;
                }
            } else {
                processedText.split('').forEach(char => {
                    targetCtx.fillText(char, curX, cfg.y);
                    curX += targetCtx.measureText(char).width + parseFloat(cfg.spacing);
                });
            }
        }

        function drawFront() {
            fCtx.clearRect(0, 0, 600, 360); fCtx.save();
            fCtx.beginPath(); fCtx.roundRect(0, 0, 600, 360, 20); fCtx.clip();
            fCtx.drawImage(fBgImg, 0, 0, 600, 360);
            
            if (petPhoto.complete && petPhoto.naturalWidth > 0) {
                fCtx.drawImage(petPhoto, config.photo.x, config.photo.y, config.photo.w, config.photo.h);
            }
            
            fCtx.textBaseline = "top";
            
            renderText(fCtx, 'f_name', document.getElementById('petName').value, true);
            
            const bY = document.getElementById('birthYear').value;
            const bM = document.getElementById('birthMonth').value;
            const bD = document.getElementById('birthDay').value;
            renderText(fCtx, 'f_birth', `民國${bY}年${bM}月${bD}日`, false);

            const iY = document.getElementById('issueYear').value;
            const iM = document.getElementById('issueMonth').value;
            const iD = document.getElementById('issueDay').value;
            const iLoc = document.getElementById('issueLocation').value;
            const locStr = iLoc.trim() === "" ? "" : `(${iLoc})`;
            renderText(fCtx, 'f_issue', `民國${iY}年${iM}月${iD}日${locStr}初發`, false);

            renderText(fCtx, 'f_gender', document.getElementById('gender').value, false);
            renderText(fCtx, 'f_chip', document.getElementById('chipId').value, true);
            
            fCtx.restore();
        }

        let lastBarcodeData = { content: "", type: "", w: 0, h: 0 };
        
        function drawBack() {
            bCtx.clearRect(0, 0, 600, 360); bCtx.save();
            bCtx.beginPath(); bCtx.roundRect(0, 0, 600, 360, 20); bCtx.clip();
            bCtx.drawImage(bBgImg, 0, 0, 600, 360);
            bCtx.textBaseline = "top";
            
            renderText(bCtx, 'b_fName', document.getElementById('fatherName').value, false);
            renderText(bCtx, 'b_mName', document.getElementById('motherName').value, false);
            renderText(bCtx, 'b_breedName', document.getElementById('breedName').value, false);
            renderText(bCtx, 'b_phoneNum', document.getElementById('phoneNum').value, false);
            renderText(bCtx, 'b_birthPlace', document.getElementById('birthPlace').value, false);
            
            // 住址動態預判：若字串過長需換行，則整體向上提升至 186.5
            const addrCfg = config['b_address'];
            bCtx.font = `${addrCfg.font === 'AdobeMing' || addrCfg.font === 'Mangal' ? 'bold ' : ''}${addrCfg.size}px '${addrCfg.font}'`;
            let curX = addrCfg.x;
            let needsWrap = false;
            const addrText = document.getElementById('address').value;
            for (let i = 0; i < addrText.length; i++) {
                let charWidth = bCtx.measureText(addrText[i]).width + parseFloat(addrCfg.spacing);
                if (curX + charWidth > addrCfg.x + 480) {
                    needsWrap = true;
                    break;
                }
                curX += charWidth;
            }
            
            const originalY = addrCfg.y;
            if (needsWrap) config['b_address'].y = 186.5;
            
            renderText(bCtx, 'b_address', addrText, false, 480, 32);
            config['b_address'].y = originalY; // 繪製完畢後還原 Y 座標

            const barcodeContent = document.getElementById('backChipId').value;
            const barcodeType = document.getElementById('barcodeType').value;
            const bc = config.b_barcode;
            
            if(barcodeContent.trim() !== "") {
                try {
                    const barcodeCanvas = document.getElementById('barcodeTemp');
                    if (lastBarcodeData.content !== barcodeContent || lastBarcodeData.type !== barcodeType || lastBarcodeData.w !== bc.width || lastBarcodeData.h !== bc.height) {
                        JsBarcode(barcodeCanvas, barcodeContent, { format: barcodeType, width: bc.width, height: bc.height, displayValue: false, background: "rgba(0,0,0,0)", margin: 0 });
                        lastBarcodeData = { content: barcodeContent, type: barcodeType, w: bc.width, h: bc.height };
                    }
                    bCtx.drawImage(barcodeCanvas, bc.x, bc.y);
                } catch(e) {}
            }

            renderText(bCtx, 'b_green', document.getElementById('greenSerial').value, true);

            bCtx.restore();
            bCtx.strokeStyle = "#ccc"; bCtx.lineWidth = 1;
            bCtx.beginPath(); bCtx.roundRect(0.5, 0.5, 599, 359, 20); bCtx.stroke();
        }

        document.fonts.ready.then(() => {
            document.querySelectorAll('input:not([type="file"]), select').forEach(el => el.addEventListener('input', drawAll));
            fBgImg.onload = drawAll; 
            bBgImg.onload = drawAll;
            
            petPhoto.src = 'Headshot.PNG';
            petPhoto.onload = drawAll;
            petPhoto.onerror = function() { drawAll(); };
            
            document.getElementById('greenSerial').value = generateGreenSerial();
            updateBackgrounds();
        });
    </script>
</body>
</html>
